<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Family Presentation - Desktop Trainer</title>
    <style>
        :root {
            --ai-bg: #e0f7fa;
            --ai-color: #006064;
            --edu-bg: #e8f5e9;
            --edu-color: #1b5e20;
            --bg-color: #e2e8f0;
            --primary: #4a69bd;
            --text-dark: #2d3748;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
            --panel-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1000px; /* Largura para Desktop */
            height: 85vh; /* Altura ideal para notebook */
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header Redesenhado para Desktop */
        header {
            background: var(--primary);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }

        header h1 {
            font-size: 1.4rem;
            margin: 0;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .toggle-switch:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .progress-container {
            width: 250px; /* Largura fixa na barra superior */
        }
        
        .progress-text {
            font-size: 0.85rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            background-color: #f8fafc;
        }

        .bubble {
            max-width: 65%; /* Balão não ocupa a tela inteira no PC */
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 1.15rem; /* Fonte melhor para leitura no PC */
            line-height: 1.5;
            animation: fadeIn 0.3s ease forwards;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-msg {
            background: var(--ai-bg);
            color: var(--ai-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .edu-msg {
            background: var(--edu-bg);
            color: var(--edu-color);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .speaker-name {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .phrase-text {
            display: block;
            font-weight: 500;
        }

        .translation-text {
            display: block;
            font-size: 0.9rem;
            margin-top: 6px;
            opacity: 0.7;
            font-style: italic;
        }

        /* Feedback Box */
        .feedback-box {
            display: none;
            margin: 0 40px 15px 40px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1rem;
            animation: fadeIn 0.3s ease;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .feedback-box.excellent { background: #e8f8f5; border-left: 5px solid var(--success); }
        .feedback-box.good { background: #fef9e7; border-left: 5px solid var(--warning); }
        .feedback-box.try-again { background: #fdedec; border-left: 5px solid var(--danger); }

        .feedback-title { font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 1.1rem;}
        .feedback-details { margin-top: 10px; font-size: 0.95rem; }
        .feedback-details p { margin-bottom: 6px; }

        .feedback-actions {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: flex-start;
        }

        .btn-action {
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-action:hover { opacity: 0.9; }
        .btn-next-anyway { background: var(--primary); color: white; }
        .btn-try-100 { background: white; color: var(--text-dark); border: 1px solid #cbd5e0; }

        /* Controls Redesenhado para Desktop */
        .controls {
            padding: 25px 40px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .buttons {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 500px; /* Mantém os botões num tamanho agradável */
        }

        button {
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-speak {
            background: var(--primary);
            color: white;
            flex: 2;
            box-shadow: 0 4px 10px rgba(74, 105, 189, 0.3);
        }

        .btn-speak:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(74, 105, 189, 0.3); }
        .btn-speak:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; color: #718096;}

        .btn-listen {
            background: #edf2f7;
            color: #4a5568;
            flex: 1;
        }
        .btn-listen:hover:not(:disabled) { background: #e2e8f0; }
        .btn-listen:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Wave Animation */
        .wave-container {
            display: none;
            align-items: center;
            height: 24px;
            gap: 5px;
            position: absolute;
            left: 40px; /* Posicionado à esquerda no painel de controles */
        }
        .wave-container.active { display: flex; }
        .wave {
            width: 5px;
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            animation: waveAnim 1s infinite ease-in-out;
        }
        .wave:nth-child(1) { animation-delay: -0.4s; }
        .wave:nth-child(2) { animation-delay: -0.2s; }
        .wave:nth-child(3) { animation-delay: 0s; }
        .wave:nth-child(4) { animation-delay: -0.2s; }
        .wave:nth-child(5) { animation-delay: -0.4s; }

        @keyframes waveAnim {
            0%, 40%, 100% { transform: scaleY(0.4); }
            20% { transform: scaleY(1); }
        }

        .fade-out { 
            animation: fadeOut 1.5s forwards; 
            animation-delay: 3s; 
        }
        @keyframes fadeOut { 
            to { opacity: 0; visibility: hidden; } 
        }
        
        .shortcuts {
            position: absolute;
            right: 40px; /* Posicionado à direita no painel de controles */
            font-size: 0.85rem;
            color: #a0aec0;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Family Presentation</h1>
        <div class="header-controls">
            <label class="toggle-switch" title="Esconde o texto e desativa o áudio automático">
                <input type="checkbox" id="memory-mode">
                🧠 Memory Mode
            </label>
            <div class="progress-container">
                <div class="progress-text">
                    <span>Progress</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="chat-area" id="chat-area"></div>

    <div class="feedback-box" id="feedback-box">
        <div class="feedback-title" id="feedback-title"></div>
        <div class="feedback-details">
            <p><strong>Você disse:</strong> <span id="feedback-spoken"></span></p>
            <p><strong>Correto:</strong> <span id="feedback-correct"></span></p>
        </div>
        <div class="feedback-actions" id="feedback-actions" style="display: none;">
            <button class="btn-action btn-try-100" id="btn-try-100">🔁 Tentar 100%</button>
            <button class="btn-action btn-next-anyway" id="btn-next-anyway">Avançar ➡️</button>
        </div>
    </div>

    <div class="controls">
        <div class="wave-container" id="wave-container">
            <div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div>
        </div>
        
        <div class="buttons">
            <button class="btn-listen" id="btn-listen" title="Atalho: R">🔊 Listen</button>
            <button class="btn-speak" id="btn-speak" title="Atalho: Espaço">🎤 Speak</button>
        </div>
        
        <div class="shortcuts">Atalhos: [Espaço] Falar | [R] Ouvir</div>
    </div>
</div>

<script>
    // --- DIALOGUE DATA ---
    const dialogueData = [
        { speaker: 'Eduardo', text: "Hello. Today I will present my family.", translation: "Olá. Hoje vou apresentar minha família." },
        { speaker: 'Eduardo', text: "This is my father. His name is Jose.", translation: "Este é meu pai. O nome dele é José." },
        { speaker: 'Eduardo', text: "This is my mother. Her name is Paula.", translation: "Esta é minha mãe. O nome dela é Paula." },
        { speaker: 'Eduardo', text: "This is my sister. Her name is Emanuelly.", translation: "Esta é minha irmã. O nome dela é Emanuelly." },
        { speaker: 'Eduardo', text: "This is my brother. His name is Emanuel.", translation: "Este é meu irmão. O nome dele é Emanuel." },
        { speaker: 'AI', text: "You have a beautiful family.", translation: "Você tem uma família linda." },
        { speaker: 'Eduardo', text: "Thank you.", translation: "Obrigado." }
    ];

    let currentStep = 0;
    let totalScore = 0;
    let isListening = false;
    
    const chatArea = document.getElementById('chat-area');
    const btnSpeak = document.getElementById('btn-speak');
    const btnListen = document.getElementById('btn-listen');
    const feedbackBox = document.getElementById('feedback-box');
    const feedbackTitle = document.getElementById('feedback-title');
    const feedbackSpoken = document.getElementById('feedback-spoken');
    const feedbackCorrect = document.getElementById('feedback-correct');
    const feedbackActions = document.getElementById('feedback-actions');
    const btnTry100 = document.getElementById('btn-try-100');
    const btnNextAnyway = document.getElementById('btn-next-anyway');
    const memoryModeToggle = document.getElementById('memory-mode');
    const waveContainer = document.getElementById('wave-container');
    const progressFill = document.getElementById('progress-fill');
    const progressPercent = document.getElementById('progress-percent');

    // --- SPEECH SYNTHESIS ---
    const synth = window.speechSynthesis;
    let englishVoice = null;

    function loadVoices() {
        const voices = synth.getVoices();
        englishVoice = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Female') || v.name.includes('Woman') || v.name.includes('Zira') || v.name.includes('Samantha'))) 
                  || voices.find(v => v.lang.startsWith('en')) 
                  || voices[0];
    }
    synth.onvoiceschanged = loadVoices;
    loadVoices();

    function speakText(text, callback) {
        if (synth.speaking) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        if (englishVoice) utterance.voice = englishVoice;
        utterance.lang = 'en-US';
        utterance.rate = 0.9; 
        
        utterance.onend = () => { if (callback) callback(); };
        synth.speak(utterance);
    }

    // --- SPEECH RECOGNITION ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.continuous = false;

        recognition.onstart = () => {
            isListening = true;
            waveContainer.classList.add('active');
            btnSpeak.innerHTML = '🛑 Stop';
            btnSpeak.style.background = '#e53e3e';
            btnSpeak.style.boxShadow = '0 4px 10px rgba(229, 62, 62, 0.3)';
            btnListen.disabled = true;
            hideFeedback();
        };

        recognition.onresult = (event) => {
            const spokenText = event.results[0][0].transcript;
            handleUserSpeech(spokenText);
        };

        recognition.onerror = (event) => {
            console.error('Speech recognition error', event.error);
            if(event.error === 'not-allowed') {
                alert('O microfone foi bloqueado. Por favor, permita o acesso nas configurações do site.');
            }
            resetMicButton();
        };

        recognition.onend = () => { resetMicButton(); };
    } else {
        alert("Seu navegador não suporta reconhecimento de voz. Use o Google Chrome.");
        btnSpeak.disabled = true;
    }

    function resetMicButton() {
        isListening = false;
        waveContainer.classList.remove('active');
        btnSpeak.innerHTML = '🎤 Speak';
        btnSpeak.style.background = 'var(--primary)';
        btnSpeak.style.boxShadow = '0 4px 10px rgba(74, 105, 189, 0.3)';
        btnListen.disabled = false;
    }

    // --- APP LOGIC ---
    function startApp() {
        currentStep = 0;
        totalScore = 0;
        updateProgressBar();
        chatArea.innerHTML = '';
        hideFeedback();
        processStep();
    }

    function processStep() {
        if (currentStep >= dialogueData.length) {
            setTimeout(() => {
                chatArea.innerHTML += '<div style="text-align:center; color:#718096; margin: 30px 0; font-size: 1.1rem; font-weight: 500;">🎉 Presentation Complete! Restarting...</div>';
                chatArea.scrollTop = chatArea.scrollHeight;
                setTimeout(startApp, 3000);
            }, 1000);
            return;
        }

        const line = dialogueData[currentStep];
        const contentHTML = `
            <div class="content-wrapper">
                <span class="phrase-text">${line.text}</span>
                <span class="translation-text">${line.translation}</span>
            </div>
        `;

        if (line.speaker === 'AI') {
            btnSpeak.disabled = true;
            appendBubble(line.speaker, contentHTML);
            speakText(line.text, () => {
                currentStep++;
                processStep();
            });
        } else {
            btnSpeak.disabled = true; 
            const bubble = appendBubble(line.speaker, contentHTML);
            const wrapper = bubble.querySelector('.content-wrapper');
            
            if (memoryModeToggle.checked) {
                wrapper.classList.add('fade-out'); 
                btnSpeak.disabled = false;
            } else {
                speakText(line.text, () => {
                    btnSpeak.disabled = false; 
                });
            }
        }
    }

    function appendBubble(speaker, htmlContent) {
        const div = document.createElement('div');
        div.className = `bubble ${speaker === 'AI' ? 'ai-msg' : 'edu-msg'}`;
        div.innerHTML = `<div class="speaker-name">${speaker}</div><div>${htmlContent}</div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    function getSimilarity(s1, s2) {
        s1 = s1.toLowerCase().replace(/[^\w\s]/gi, '').trim();
        s2 = s2.toLowerCase().replace(/[^\w\s]/gi, '').trim();

        if (s1 === s2) return 100;
        if (s1.length === 0 || s2.length === 0) return 0;

        const costs = new Array();
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i === 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    }
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        
        const distance = costs[s2.length];
        const maxLength = Math.max(s1.length, s2.length);
        const similarity = ((maxLength - distance) / maxLength) * 100;
        
        return Math.round(similarity);
    }

    function handleUserSpeech(spokenText) {
        const line = dialogueData[currentStep];
        const correctText = line.text;
        
        let accuracy = getSimilarity(correctText, spokenText);
        
        if (spokenText.toLowerCase().replace(/[^\w\s]/gi, '').trim() === correctText.toLowerCase().replace(/[^\w\s]/gi, '').trim()) {
            accuracy = 100;
        }

        feedbackBox.className = 'feedback-box'; 
        feedbackBox.style.display = 'block';
        feedbackActions.style.display = 'none';

        feedbackSpoken.innerText = spokenText;
        feedbackCorrect.innerText = correctText;

        if (accuracy === 100) {
            feedbackBox.classList.add('excellent');
            feedbackTitle.innerHTML = `🌟 Perfeito! (100%)`;
            
            totalScore += 1;
            updateProgressBar();
            btnSpeak.disabled = true;

            setTimeout(() => { advanceToNextPhrase(); }, 2000);

        } else if (accuracy >= 70) {
            feedbackBox.classList.add('good');
            feedbackTitle.innerHTML = `🟡 Bom! (Precisão: ${accuracy}%)`;
            feedbackActions.style.display = 'flex'; 

        } else {
            feedbackBox.classList.add('try-again');
            feedbackTitle.innerHTML = `🔴 Tente novamente (Precisão: ${accuracy}%)`;
        }
        
        // Mantém a rolagem no fundo para ver o feedback
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    btnNextAnyway.addEventListener('click', () => {
        totalScore += 1; 
        updateProgressBar();
        advanceToNextPhrase();
    });

    btnTry100.addEventListener('click', () => {
        hideFeedback();
    });

    function advanceToNextPhrase() {
        hideFeedback();
        
        const lastBubble = chatArea.lastElementChild;
        const wrapper = lastBubble.querySelector('.content-wrapper');
        if (wrapper) wrapper.classList.remove('fade-out');

        currentStep++;
        processStep();
    }

    function hideFeedback() {
        feedbackBox.style.display = 'none';
        feedbackActions.style.display = 'none';
    }

    function updateProgressBar() {
        const eduardoPhrasesCount = dialogueData.filter(d => d.speaker === 'Eduardo').length;
        let percent = 0;
        if (eduardoPhrasesCount > 0) {
            percent = Math.min(100, Math.round((totalScore / eduardoPhrasesCount) * 100));
        }
        progressPercent.innerText = `${percent}%`;
        progressFill.style.width = `${percent}%`;
    }

    // --- EVENT LISTENERS ---
    btnSpeak.addEventListener('click', () => {
        if (!recognition) return;
        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    btnListen.addEventListener('click', () => {
        if(dialogueData[currentStep]) {
            speakText(dialogueData[currentStep].text);
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !btnSpeak.disabled) {
            e.preventDefault(); 
            if (!isListening && recognition) recognition.start();
        }
        if (e.code === 'KeyR' || e.key === 'r') {
            if(!btnListen.disabled) btnListen.click();
        }
    });

    window.onload = () => { setTimeout(startApp, 500); };

</script>
</body>
</html>
