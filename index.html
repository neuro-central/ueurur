<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Speaking Trainer - Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
            --panel-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Fundo Animado Suave */
        body {
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(-45deg, #a8c0ff, #3f2b96, #8e2de2, #4a00e0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Controle de Telas (Views) */
        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; animation: fadeInView 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeInView {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- DASHBOARD VIEW --- */
        .header-dash {
            padding: 30px 40px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.5);
        }
        .header-dash h1 { font-size: 1.8rem; color: var(--text-dark); font-weight: 800; background: -webkit-linear-gradient(#3f2b96, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .btn-create {
            background: var(--primary); color: white; border: none;
            padding: 12px 24px; border-radius: 50px; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: all 0.2s; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .btn-create:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .blocks-grid {
            padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; overflow-y: auto; flex: 1;
        }

        .block-card {
            background: white; border: 1px solid var(--border); border-radius: 20px;
            padding: 25px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .block-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.15); }
        .block-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; color: #1e293b; }
        .block-info { font-size: 0.95rem; color: var(--text-muted); font-weight: 500;}
        .block-actions { margin-top: 20px; display: flex; gap: 10px; }
        
        .btn-card-action { padding: 8px 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1;}
        .btn-edit { background: #f1f5f9; color: #475569; }
        .btn-edit:hover { background: #e2e8f0; }
        .btn-delete { background: #fee2e2; color: var(--danger); }
        .btn-delete:hover { background: #fecaca; }

        /* --- EDITOR VIEW --- */
        .editor-header { padding: 20px 40px; background: rgba(255,255,255,0.8); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
        .editor-body { padding: 30px 40px; overflow-y: auto; flex: 1; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 1.1rem; color: #334155;}
        .input-group input[type="text"] { width: 100%; padding: 14px 20px; border: 2px solid var(--border); border-radius: 12px; font-size: 1.1rem; outline: none; transition: border-color 0.2s; background: #f8fafc;}
        .input-group input[type="text"]:focus { border-color: var(--primary); background: white;}

        .phrase-list { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .phrase-item { background: white; border: 1px solid var(--border); padding: 20px; border-radius: 16px; display: flex; gap: 15px; align-items: stretch; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        
        .phrase-inputs { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .speaker-row { display: flex; gap: 10px; }
        .inp-speaker { flex: 2; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: bold;}
        .inp-color { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; background: white;}
        
        .phrase-inputs input.inp-text { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        .phrase-inputs input.inp-text:focus { outline: none; border-color: var(--primary); }
        
        .btn-remove-phrase { background: #fef2f2; color: var(--danger); border: none; width: 45px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.2s;}
        .btn-remove-phrase:hover { background: #fee2e2; }
        
        .btn-add-phrase { background: #e0e7ff; color: var(--primary-hover); border: 2px dashed #818cf8; width: 100%; padding: 18px; border-radius: 16px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .btn-add-phrase:hover { background: #c7d2fe; }
        .btn-save-block { background: var(--success); color: white; border: none; padding: 12px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);}
        .btn-cancel { background: transparent; color: var(--text-muted); border: none; font-weight: bold; cursor: pointer; margin-right: 20px; font-size: 1rem;}

        .auto-translate-hint { font-size: 0.8rem; color: var(--primary); margin-top: -8px; margin-bottom: 5px; font-weight: 500; }

        /* --- PRACTICE VIEW --- */
        .header-practice {
            background: linear-gradient(90deg, #3f2b96, #6366f1); color: white; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .header-practice h2 { font-size: 1.3rem; font-weight: 700; }
        .practice-controls-top { display: flex; align-items: center; gap: 25px; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-back:hover { background: rgba(255,255,255,0.3); }
        
        .toggle-switch { display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(0,0,0,0.2); padding: 8px 16px; border-radius: 20px; font-size: 0.95rem; font-weight: 500;}
        .progress-container { width: 200px; }
        .progress-text { font-size: 0.85rem; margin-bottom: 6px; display: flex; justify-content: space-between; font-weight: 600; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #10b981; width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .chat-area { flex: 1; padding: 30px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: transparent;}

        .bubble {
            max-width: 75%; padding: 20px 25px; border-radius: 24px; font-size: 1.25rem;
            line-height: 1.5; animation: bubbleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; align-self: flex-start;
            border: 1px solid rgba(0,0,0,0.05); color: #1e293b; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            border-bottom-left-radius: 4px;
        }
        
        @keyframes bubbleIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .speaker-name { font-size: 0.85rem; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8;}
        .phrase-text { display: block; font-weight: 700; color: #0f172a; }
        .translation-text { display: block; font-size: 1rem; margin-top: 8px; opacity: 0.7; font-style: italic; color: #334155; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 8px;}

        /* Feedback Box */
        .feedback-box { display: none; margin: 0 40px 15px 40px; padding: 20px; border-radius: 16px; font-size: 1rem; animation: fadeInView 0.3s ease; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid transparent;}
        .feedback-box.excellent { border-color: var(--success); background: #f0fdf4; }
        .feedback-box.good { border-color: var(--warning); background: #fffbeb; }
        .feedback-box.try-again { border-color: var(--danger); background: #fef2f2; }
        .feedback-title { font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 1.2rem;}
        
        .feedback-actions { display: flex; gap: 15px; margin-top: 15px; }
        .btn-action { padding: 10px 20px; font-size: 1rem; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-next-anyway { background: var(--primary); color: white; }
        .btn-next-anyway:hover { background: var(--primary-hover); }
        .btn-try-100 { background: white; border: 2px solid #cbd5e1; color: #475569;}
        .btn-try-100:hover { background: #f8fafc; border-color: #94a3b8;}

        .controls { padding: 25px 40px; background: rgba(255,255,255,0.8); border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; position: relative; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;}

        .buttons { display: flex; gap: 15px; width: 100%; max-width: 500px; }
        .btn-main { border: none; padding: 16px 24px; border-radius: 50px; font-size: 1.15rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;}
        
        .btn-speak { background: var(--primary); color: white; flex: 2; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
        .btn-speak:active { transform: translateY(4px); box-shadow: 0 2px 5px rgba(99, 102, 241, 0.4); }
        .btn-speak:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; opacity: 0.7;}
        
        .btn-listen { background: #f8fafc; color: #334155; flex: 1; border: 2px solid #e2e8f0; }
        .btn-listen:hover:not(:disabled) { background: #e2e8f0; }

        .wave-container { display: none; align-items: center; height: 24px; gap: 5px; position: absolute; left: 40px; }
        .wave-container.active { display: flex; }
        .wave { width: 5px; height: 100%; background: var(--primary); border-radius: 3px; animation: waveAnim 1s infinite ease-in-out; }
        .wave:nth-child(1) { animation-delay: -0.4s; }
        .wave:nth-child(2) { animation-delay: -0.2s; }
        .wave:nth-child(3) { animation-delay: 0s; }
        .wave:nth-child(4) { animation-delay: -0.2s; }
        .wave:nth-child(5) { animation-delay: -0.4s; }

        @keyframes waveAnim { 0%, 40%, 100% { transform: scaleY(0.4); } 20% { transform: scaleY(1); } }
        .fade-out { animation: fadeOut 1.5s forwards; animation-delay: 3s; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .shortcuts { position: absolute; right: 40px; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="view-dashboard" class="view active">
        <div class="header-dash">
            <h1>Meus Blocos de Estudo</h1>
            <button class="btn-create" onclick="openEditor()">+ Criar Novo Bloco</button>
        </div>
        <div class="blocks-grid" id="blocks-grid">
            </div>
    </div>

    <div id="view-editor" class="view">
        <div class="editor-header">
            <h2 id="editor-title-text">Criar Novo Bloco</h2>
            <div>
                <button class="btn-cancel" onclick="showView('dashboard')">Cancelar</button>
                <button class="btn-save-block" onclick="saveBlock()">💾 Salvar</button>
            </div>
        </div>
        <div class="editor-body">
            <div class="input-group">
                <label>Nome do Bloco de Estudo</label>
                <input type="text" id="edit-title" placeholder="Ex: Apresentação da Família">
            </div>
            <label style="font-weight: 700; margin-bottom: 5px; display: block; font-size: 1.1rem; color: #334155;">Construa o Diálogo</label>
            <div class="auto-translate-hint">🪄 Dica: Digite em inglês e clique fora da caixa. O app traduz para você!</div>
            
            <div class="phrase-list" id="phrase-list">
                </div>
            <button class="btn-add-phrase" onclick="addPhraseInput('Eduardo', '#f0fdf4')">+ Adicionar Próxima Fala</button>
        </div>
    </div>

    <div id="view-practice" class="view">
        <div class="header-practice">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="btn-back" onclick="exitPractice()">⬅ Voltar</button>
                <h2 id="practice-title">Prática</h2>
            </div>
            <div class="practice-controls-top">
                <label class="toggle-switch" title="Esconde o texto e desativa o áudio automático">
                    <input type="checkbox" id="memory-mode">
                    🧠 Memory Mode
                </label>
                <div class="progress-container">
                    <div class="progress-text">
                        <span>Progresso Geral</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-area" id="chat-area"></div>

        <div class="feedback-box" id="feedback-box">
            <div class="feedback-title" id="feedback-title"></div>
            <div class="feedback-details">
                <p><strong>Você falou:</strong> <span id="feedback-spoken" style="color: #64748b;"></span></p>
                <p><strong>Correto:</strong> <span id="feedback-correct" style="font-weight:bold;"></span></p>
            </div>
            <div class="feedback-actions" id="feedback-actions" style="display: none;">
                <button class="btn-action btn-try-100" id="btn-try-100">🔁 Quero tentar os 100%</button>
                <button class="btn-action btn-next-anyway" id="btn-next-anyway">Avançar ➡️</button>
            </div>
        </div>

        <div class="controls">
            <div class="wave-container" id="wave-container">
                <div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div>
            </div>
            
            <div class="buttons">
                <button class="btn-main btn-listen" id="btn-listen" title="Atalho: R">🔊 Escutar</button>
                <button class="btn-main btn-speak" id="btn-speak" title="Atalho: Espaço">🎤 Falar</button>
            </div>
            
            <div class="shortcuts">Atalhos: [Espaço] Falar | [R] Escutar</div>
        </div>
    </div>

</div>

<script>
    // --- DATABASE ---
    let studyBlocks = [];
    let currentEditingBlockId = null;

    // Bloco padrão atualizado para a Família do Eduardo
    const DEFAULT_BLOCKS = [
        {
            id: 'default_family',
            title: 'Apresentação da Família 👨‍👩‍👧‍👦',
            phrases: [
                { speaker: 'Eduardo', color: '#f0fdf4', text: "Hello. Today I will present my family.", translation: "Olá. Hoje vou apresentar minha família." },
                { speaker: 'Eduardo', color: '#f0fdf4', text: "This is my father. His name is Jose.", translation: "Este é meu pai. O nome dele é José." },
                { speaker: 'Eduardo', color: '#f0fdf4', text: "This is my mother. Her name is Paula.", translation: "Esta é minha mãe. O nome dela é Paula." },
                { speaker: 'Eduardo', color: '#f0fdf4', text: "This is my sister. Her name is Emanuelly.", translation: "Esta é minha irmã. O nome dela é Emanuelly." },
                { speaker: 'Eduardo', color: '#f0fdf4', text: "This is my brother. His name is Emanuel.", translation: "Este é meu irmão. O nome dele é Emanuel." },
                { speaker: 'IA', color: '#eff6ff', text: "You have a beautiful family.", translation: "Você tem uma família linda." },
                { speaker: 'Eduardo', color: '#f0fdf4', text: "Thank you.", translation: "Obrigado." }
            ]
        }
    ];

    function loadData() {
        // Atualizei a chave do LocalStorage para forçar o carregamento do novo bloco padrão
        const saved = localStorage.getItem('englishBlocksDataV3');
        if (saved) {
            studyBlocks = JSON.parse(saved);
        } else {
            studyBlocks = [...DEFAULT_BLOCKS];
            saveData();
        }
        renderDashboard();
    }

    function saveData() {
        localStorage.setItem('englishBlocksDataV3', JSON.stringify(studyBlocks));
    }

    // --- FUNÇÃO DE TRADUÇÃO AUTOMÁTICA (Mágica!) ---
    async function autoTranslate(engInput) {
        const ptInput = engInput.parentElement.querySelector('.inp-pt');
        const text = engInput.value.trim();
        
        // Só traduz se houver texto em inglês e a caixa em português estiver vazia
        if (!text || ptInput.value.trim() !== '') return;

        ptInput.placeholder = "🪄 Traduzindo...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pt&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if(data && data[0] && data[0][0] && data[0][0][0]) {
                ptInput.value = data[0][0][0];
            }
        } catch (e) {
            console.error("Erro na tradução automática", e);
        } finally {
            ptInput.placeholder = "Tradução para Português";
        }
    }

    // --- VIEW MANAGEMENT ---
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${viewId}`).classList.add('active');
    }

    // --- DASHBOARD LOGIC ---
    function renderDashboard() {
        const grid = document.getElementById('blocks-grid');
        grid.innerHTML = '';
        studyBlocks.forEach(block => {
            const card = document.createElement('div');
            card.className = 'block-card';
            card.innerHTML = `
                <div onclick="startPractice('${block.id}')" style="flex:1;">
                    <div class="block-title">${block.title}</div>
                    <div class="block-info">🗣️ ${block.phrases.length} falas neste diálogo</div>
                </div>
                <div class="block-actions">
                    <button class="btn-card-action btn-edit" onclick="editBlock('${block.id}', event)">✏️ Editar</button>
                    <button class="btn-card-action btn-delete" onclick="deleteBlock('${block.id}', event)">🗑️ Excluir</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function deleteBlock(id, event) {
        event.stopPropagation();
        if(confirm("Tem certeza que deseja excluir este bloco?")) {
            studyBlocks = studyBlocks.filter(b => b.id !== id);
            saveData();
            renderDashboard();
        }
    }

    function editBlock(id, event) {
        event.stopPropagation();
        const block = studyBlocks.find(b => b.id === id);
        currentEditingBlockId = block.id;
        
        document.getElementById('editor-title-text').innerText = "Editar Bloco";
        document.getElementById('edit-title').value = block.title;
        
        const list = document.getElementById('phrase-list');
        list.innerHTML = '';
        
        block.phrases.forEach(p => {
            addPhraseInput(p.speaker, p.color, p.text, p.translation);
        });
        
        showView('editor');
    }

    // --- EDITOR LOGIC ---
    function openEditor() {
        currentEditingBlockId = null;
        document.getElementById('editor-title-text').innerText = "Criar Novo Bloco";
        document.getElementById('edit-title').value = '';
        const list = document.getElementById('phrase-list');
        list.innerHTML = '';
        addPhraseInput('Eduardo', '#f0fdf4'); 
        showView('editor');
    }

    function addPhraseInput(speaker = 'Eduardo', color = '#f0fdf4', eng = '', pt = '') {
        const list = document.getElementById('phrase-list');
        const div = document.createElement('div');
        div.className = 'phrase-item';
        
        const colors = [
            {val: '#f0fdf4', name: 'Verde (Você)'},
            {val: '#eff6ff', name: 'Azul (Outro)'},
            {val: '#fdf2f8', name: 'Rosa (Outro)'},
            {val: '#fffbeb', name: 'Amarelo (Outro)'},
            {val: '#f5f3ff', name: 'Roxo (Outro)'}
        ];

        let options = colors.map(c => `<option value="${c.val}" ${color === c.val ? 'selected' : ''}>${c.name}</option>`).join('');

        div.innerHTML = `
            <div class="phrase-inputs">
                <div class="speaker-row">
                    <input type="text" class="inp-speaker" placeholder="Personagem (Ex: Eduardo)" value="${speaker}">
                    <select class="inp-color">${options}</select>
                </div>
                <input type="text" class="inp-eng inp-text" placeholder="Frase em Inglês (O que vai ser falado)" value="${eng}" onblur="autoTranslate(this)">
                <input type="text" class="inp-pt inp-text" placeholder="Tradução para Português" value="${pt}">
            </div>
            <button class="btn-remove-phrase" onclick="this.parentElement.remove()" title="Remover Fala">X</button>
        `;
        list.appendChild(div);
    }

    function saveBlock() {
        const title = document.getElementById('edit-title').value.trim() || 'Meu Diálogo';
        const items = document.querySelectorAll('.phrase-item');
        const phrases = [];
        
        items.forEach(item => {
            const speaker = item.querySelector('.inp-speaker').value.trim() || 'Pessoa';
            const color = item.querySelector('.inp-color').value;
            const eng = item.querySelector('.inp-eng').value.trim();
            const pt = item.querySelector('.inp-pt').value.trim();
            if (eng) {
                phrases.push({ text: eng, translation: pt, speaker, color });
            }
        });

        if (phrases.length === 0) {
            alert("Adicione pelo menos uma frase em inglês!");
            return;
        }

        if (currentEditingBlockId) {
            const index = studyBlocks.findIndex(b => b.id === currentEditingBlockId);
            studyBlocks[index] = { id: currentEditingBlockId, title, phrases };
        } else {
            const newBlock = { id: 'block_' + Date.now(), title, phrases };
            studyBlocks.push(newBlock);
        }

        saveData();
        renderDashboard();
        showView('dashboard');
    }

    // --- PRACTICE LOGIC ---
    let activeBlock = null;
    let currentStep = 0;
    let totalScore = 0;
    let isListening = false;
    
    const chatArea = document.getElementById('chat-area');
    const btnSpeak = document.getElementById('btn-speak');
    const btnListen = document.getElementById('btn-listen');
    const feedbackBox = document.getElementById('feedback-box');
    const feedbackTitle = document.getElementById('feedback-title');
    const feedbackSpoken = document.getElementById('feedback-spoken');
    const feedbackCorrect = document.getElementById('feedback-correct');
    const feedbackActions = document.getElementById('feedback-actions');
    const btnTry100 = document.getElementById('btn-try-100');
    const btnNextAnyway = document.getElementById('btn-next-anyway');
    const memoryModeToggle = document.getElementById('memory-mode');
    const waveContainer = document.getElementById('wave-container');
    const progressFill = document.getElementById('progress-fill');
    const progressPercent = document.getElementById('progress-percent');

    window.utterances = [];
    const synth = window.speechSynthesis;
    let englishVoice = null;

    function loadVoices() {
        const voices = synth.getVoices();
        englishVoice = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Female') || v.name.includes('Woman') || v.name.includes('Zira'))) 
                  || voices.find(v => v.lang.startsWith('en')) || voices[0];
    }
    synth.onvoiceschanged = loadVoices;
    loadVoices();

    function speakText(text, callback) {
        if (synth.speaking) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        if (englishVoice) utterance.voice = englishVoice;
        utterance.lang = 'en-US';
        utterance.rate = 0.85; 
        
        utterance.onend = () => { if (callback) callback(); };
        window.utterances.push(utterance); 
        synth.speak(utterance);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.continuous = false;

        recognition.onstart = () => {
            isListening = true;
            waveContainer.classList.add('active');
            btnSpeak.innerHTML = '🛑 Parar Microfone';
            btnSpeak.style.background = 'var(--danger)';
            btnSpeak.style.boxShadow = 'none';
            btnListen.disabled = true;
            hideFeedback();
        };

        recognition.onresult = (event) => {
            const spokenText = event.results[0][0].transcript;
            handleUserSpeech(spokenText);
        };

        recognition.onerror = (event) => {
            console.error('Mic Error:', event.error);
            resetMicButton();
        };

        recognition.onend = () => { resetMicButton(); };
    } else {
        alert("Seu navegador não suporta reconhecimento de voz. Use o Chrome.");
    }

    function resetMicButton() {
        isListening = false;
        waveContainer.classList.remove('active');
        btnSpeak.innerHTML = '🎤 Falar';
        btnSpeak.style.background = 'var(--primary)';
        btnSpeak.style.boxShadow = '0 8px 20px rgba(99, 102, 241, 0.4)';
        btnListen.disabled = false;
    }

    function startPractice(blockId) {
        activeBlock = studyBlocks.find(b => b.id === blockId);
        document.getElementById('practice-title').innerText = activeBlock.title;
        currentStep = 0;
        totalScore = 0;
        updateProgressBar();
        chatArea.innerHTML = '';
        hideFeedback();
        showView('practice');
        processStep();
    }

    function exitPractice() {
        if(synth.speaking) synth.cancel();
        if(isListening && recognition) recognition.stop();
        showView('dashboard');
    }

    function processStep() {
        if (currentStep >= activeBlock.phrases.length) {
            setTimeout(() => {
                chatArea.innerHTML += '<div style="text-align:center; color:#475569; margin: 30px 0; font-weight: 800; font-size:1.2rem;">🎉 Treino Concluído! Reiniciando bloco...</div>';
                chatArea.scrollTop = chatArea.scrollHeight;
                setTimeout(() => startPractice(activeBlock.id), 3000);
            }, 1000);
            return;
        }

        const line = activeBlock.phrases[currentStep];
        
        const contentHTML = `
            <div class="content-wrapper">
                <span class="phrase-text">${line.text}</span>
                <span class="translation-text">${line.translation}</span>
            </div>
        `;

        btnSpeak.disabled = true; 
        const bubble = appendBubble(contentHTML, line.speaker, line.color);
        const wrapper = bubble.querySelector('.content-wrapper');
        
        if (memoryModeToggle.checked) {
            wrapper.classList.add('fade-out'); 
            btnSpeak.disabled = false;
        } else {
            speakText(line.text, () => {
                btnSpeak.disabled = false; 
            });
        }
    }

    function appendBubble(htmlContent, speakerName, colorCode) {
        const div = document.createElement('div');
        div.className = 'bubble';
        div.style.backgroundColor = colorCode || '#f8fafc';
        
        div.innerHTML = `<div class="speaker-name">🎭 Interprete: ${speakerName || 'Você'}</div><div>${htmlContent}</div>`;
        
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    function getSimilarity(s1, s2) {
        s1 = s1.toLowerCase().replace(/[^\w\s]/gi, '').trim();
        s2 = s2.toLowerCase().replace(/[^\w\s]/gi, '').trim();
        if (s1 === s2) return 100;
        if (s1.length === 0 || s2.length === 0) return 0;
        const costs = new Array();
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i === 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    }
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        const dist = costs[s2.length];
        const maxLen = Math.max(s1.length, s2.length);
        return Math.round(((maxLen - dist) / maxLen) * 100);
    }

    function handleUserSpeech(spokenText) {
        const correctText = activeBlock.phrases[currentStep].text;
        let accuracy = getSimilarity(correctText, spokenText);
        
        if (spokenText.toLowerCase().replace(/[^\w\s]/gi, '').trim() === correctText.toLowerCase().replace(/[^\w\s]/gi, '').trim()) {
            accuracy = 100;
        }

        feedbackBox.className = 'feedback-box'; 
        feedbackBox.style.display = 'block';
        feedbackActions.style.display = 'none';

        feedbackSpoken.innerText = spokenText;
        feedbackCorrect.innerText = correctText;

        if (accuracy === 100) {
            feedbackBox.classList.add('excellent');
            feedbackTitle.innerHTML = `🌟 Perfeito! (100%)`;
            totalScore += 1;
            updateProgressBar();
            btnSpeak.disabled = true;
            setTimeout(() => { advanceToNextPhrase(); }, 1500);

        } else if (accuracy >= 70) {
            feedbackBox.classList.add('good');
            feedbackTitle.innerHTML = `🟡 Bom! (Precisão: ${accuracy}%)`;
            feedbackActions.style.display = 'flex'; 

        } else {
            feedbackBox.classList.add('try-again');
            feedbackTitle.innerHTML = `🔴 Tente novamente (Precisão: ${accuracy}%)`;
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    btnNextAnyway.addEventListener('click', () => {
        totalScore += 1; 
        updateProgressBar();
        advanceToNextPhrase();
    });

    btnTry100.addEventListener('click', () => { hideFeedback(); });

    function advanceToNextPhrase() {
        hideFeedback();
        const lastBubble = chatArea.lastElementChild;
        const wrapper = lastBubble.querySelector('.content-wrapper');
        if (wrapper) wrapper.classList.remove('fade-out');

        currentStep++;
        processStep();
    }

    function hideFeedback() {
        feedbackBox.style.display = 'none';
        feedbackActions.style.display = 'none';
    }

    function updateProgressBar() {
        const totalPhrases = activeBlock.phrases.length;
        let percent = 0;
        if (totalPhrases > 0) {
            percent = Math.min(100, Math.round((totalScore / totalPhrases) * 100));
        }
        progressPercent.innerText = `${percent}%`;
        progressFill.style.width = `${percent}%`;
    }

    // Controles
    btnSpeak.addEventListener('click', () => {
        if (!recognition) return;
        if (isListening) { recognition.stop(); } else { recognition.start(); }
    });

    btnListen.addEventListener('click', () => {
        if(activeBlock && activeBlock.phrases[currentStep]) { 
            speakText(activeBlock.phrases[currentStep].text); 
        }
    });

    document.addEventListener('keydown', (e) => {
        if(document.getElementById('view-practice').classList.contains('active')) {
            if (e.code === 'Space' && !btnSpeak.disabled) {
                e.preventDefault(); 
                if (!isListening && recognition) recognition.start();
            }
            if (e.code === 'KeyR' || e.key === 'r') {
                if(!btnListen.disabled) btnListen.click();
            }
        }
    });

    // Iniciar app
    window.onload = loadData;

</script>
</body>
</html>
